<!DOCTYPE html>
<html>

<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Laporan</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }

    /* HEADER (judul + search) */
    .header {
      position: sticky;
      top: 0;
      background-color: white;
      z-index: 1000;
      padding: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .header h1 {
      margin: 0;
    }

    #search {
      margin-top: 10px;
      padding: 5px;
      width: 250px;
    }
<canvas id="myChart" height="100"></canvas>

    /* TABEL */
    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid black;
      padding: 6px;
      text-align: center;
    }

    /* Header tabel freeze */
    th {
      position: sticky;
      top: 90px; /* sesuaikan tinggi header */
      background-color: #4CAF50;
      color: white;
      z-index: 999;
    }

    /* Zebra */
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    tr:hover {
      background-color: #ddd;
    }

    /* Kolom pertama (Kriteria) kiri */
    td:first-child, th:first-child {
      text-align: left !important;
      padding-left: 10px;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>DATA PEGAWAI DIREKTORAT METROLOGI</h1>
  <input type="text" id="search" placeholder="Cari disini..." onkeyup="searchTable()">
</div>

<h2>Data Laporan</h2>
<table id="tabel"></table>

<script>
let allData = [];

function loadData() {
  fetch("https://script.google.com/macros/s/AKfycby1IX6PtGvI-C5OkanOYLgH1aRznhGqZXBQNNDzpPZmQpmtDry0MpObcENl0VO7nZOs/exec")
    .then(res => res.json())
    .then(data => {
      allData = data;
      renderTable(data);
renderChart(data);
    });
}

function renderTable(data) {
  let table = document.getElementById("tabel");
  table.innerHTML = "";

  data.forEach((row, i) => {
    let tr = document.createElement("tr");

    row.forEach(cell => {
      let td = document.createElement(i === 0 ? "th" : "td");

      if (typeof cell === "number" && cell < 1 && cell > 0) {
        td.innerText = (cell * 100).toFixed(1) + "%";
      } else {
        td.innerText = cell;
      }

      tr.appendChild(td);
    });

    table.appendChild(tr);
  });
}

/* SEARCH FIX */
function searchTable() {
  let keyword = document.getElementById("search").value.toLowerCase();

  let filtered = allData.filter((row, i) => {
    if (i === 0) return true; // header tetap tampil
    return row.join(" ").toLowerCase().includes(keyword);
  });

  renderTable(filtered);
}

loadData();
</script>

</body>
</html>
<script>
function renderChart(data) {
  // contoh ambil baris "Usia"
  let labels = data[0].slice(1); // header (kolom)
  let values = data.find(row => row[0].toLowerCase().includes("usia")).slice(1);

  // ubah ke persen
  values = values.map(v => v * 100);

  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'bar', // ganti 'pie' kalau mau pie chart
    data: {
      labels: labels,
      datasets: [{
        label: 'Persentase Usia',
        data: values,
        borderWidth: 1
      }]
    }
  });
}
</script>
